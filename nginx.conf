server {
    listen 8090;

    # Static frontend files.
    # no-cache (revalidate every load) so the headless kiosk never runs a stale
    # index.html/app.js after a deploy. Without this, Chrome served cached JS
    # across restarts and fixes silently didn't take effect. Files are tiny and
    # local, so revalidation is cheap; 304s still avoid re-downloading unchanged.
    location / {
        root /app/public;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # HLS stream files — served directly by nginx
    location /streams/ {
        alias /app/streams/;
        add_header Cache-Control "no-cache";
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    # SSE events — buffering must be off so events reach the browser immediately
    location /api/events {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # API requests — proxy to Python backend
    location /api/ {
        proxy_pass http://127.0.0.1:8091;
        proxy_set_header Host $host;
    }
}
